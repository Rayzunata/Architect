<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /*##################### GERÜST - START  #####################*/
        body{
            background-color: black;
            color: #d8bfd8;
            font-family:Arial, sans-serif;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 12px;
        }

        .headContainer{
            border: 1px solid rgb(217, 21, 150);
            /* padding: 5px; */
            margin-bottom: 5px;
            display: grid;
            grid-template-columns: 20% 60% 20%;
            /* gap: 20px; */

        }

        .logoContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
            margin-left: 0px;
            
        }

        .testelementContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;

        }

        .gameContainer{
            display: grid;
            grid-template-columns: 20% 60% 20%;
            /* gap: 20px; */
            /* border: 1px solid rgb(217, 21, 150); */
            height: 650px
            
        }

        .leftContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
            margin-left: 0px;
        }

        .midContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
        }
        .entryMidContainer{
            height: auto;
            /* display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 10px; */
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        .rightContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
            margin-right: 0px;
        }

        .bottomContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
        }

        .footContainer{
            border: 1px solid rgb(217, 21, 150);
            margin-top: 5px;

        }

        /*##################### GERÜST - END  #####################*/

        .testEintrag{
            margin: 5px;
            padding: 5px;
            /* color: rgb(182, 138, 167); */
            background-color: #15071a;
            border: 1px solid rgb(217, 21, 150);
            border-radius: 5px;
            border-left: 7px solid rgb(217, 21, 150);
        }
        .testEintrag p{
            margin: 5px;
            
        }

        /*##################### EINGEHÄNGTES CSS - START  #####################*/
        .materialDiv{
            margin: 5px;
            height: 225px;
            /* width: 290px; */
            border: 1px solid rgb(217, 21, 150);
            border-left: 7px solid rgb(217, 21, 150);
            border-radius:5px;
            background-color: #220a2b;
            padding:10px;
            /* box-shadow:0 0 6px rgba(217,21,150,.15); */
        }
        .materialDiv div{
            border-bottom: 1px solid rgb(217, 21, 150);
            box-shadow: 0px 2px 0px rgba(217,21,150,.15);
        }

        .button{
            background:#220a2b;
            color:#d8bfd8;

            width: 287px;
            height: 25px;
            border-radius:4px;
            cursor:pointer;
            /* transition: 0.5s; */
            text-align: left;
        }
        .button:hover{
            border-left: 7px solid rgb(245, 135, 207);

            background:#3b103f;
            
        }

        .regionSelectDiv{
            width: 300px;
            border-right: 1px solid rgb(217, 21, 150);
            border-radius: 5px;
        }
        .regionDetailDiv{
            border-right: 1px solid rgb(217, 21, 150);
            border-radius: 5px;

        }

        /*##################### EINGEHÄNGTES CSS - ENDE  #####################*/
        .inventorySlot{
            margin: 5px;
            
            border-right: 1px solid rgb(21, 61, 217);
            border-left: 5px solid rgb(21, 61, 217);
            border-radius: 5px;
        }
        .nameTag{
            margin: 5px;
            padding: 5px;
            color: aqua;
            border-left: 3px solid rgb(217, 21, 150);
            border-radius: 5px;
        }
        .detailsTag{
            margin: 10px;
            padding: 5px;
            color: bisque;
            border-left: 3px solid rgb(217, 21, 150);
            border-radius: 5px;
        }
        .detailsTag p{
            margin: 0px;
        }
        
    </style>
</head>
<body>

    <div class="headContainer" id="headContainer">
        <div class="logoContainer" id="logoContainer"><p>LOGO</p></div>
        <div class="testelementContainer" id="testelementContainer"><p>TESTEINTRAG</p></div>
    </div>
    <div class="gameContainer" id="gameContainer">

        <div class="leftContainer" id="leftContainer">

            <div class="entryLeftContainer" id="entryLeftContainer">

                <!-- <div class="testEintrag"><p>testEintrag</p>
                    
                </div> -->

                <button class="testEintrag button" id="button1" title="zeigt Inventar">renderInventory()</button>
                <button class="testEintrag button" id="button2" title="clear test">pushRandomItem()</button>

            </div>

        </div>
        <div class="midContainer" id="midContainer">

            <div class="entryMidContainer" id="entryMidContainer">

                <!-- <div class="testEintrag"><p>testEintrag</p>

                </div> -->

            </div>

        </div>
        <div class="rightContainer" id="rightContainer">

            <div class="entryRightContainer" id="entryRightContainer">

                <!-- <div class="testEintrag"><p>testEintrag</p>

                </div> -->

            </div>

        </div>


    </div>
    
    <div class="footContainer" id="footContainer"><p>foot</p></div>

    <script type="module">

        import { materials as materialsRegistry } from "./data/registries/economy/items/materials.js";

        const inventoryContainer = document.getElementById("entryMidContainer");
        const logContainer = document.getElementById("entryRightContainer");
        
        // -----------------------------------------------------------
        // Definitionen
        // -----------------------------------------------------------

        const forms = {
            ore:{
                name: "erz"
            },
            log:{
                name: "stamm"
            },
            fish:{
                name: "fisch"
            },
            herb:{
                name: "kraut"
            }
        }

        const materials = {
            //ORE
            copper:{
                name: "Kupfer",
            },
            iron:{
                name: "Eisen"
            },
            tin:{
                name: "Zinn",
            },

            //WOOD
            oak:{
                name: "Eichen",
            },

            //FISH
            hecht:{
                name: "Hecht",
            },

            //HERBS
            nessel:{
                name: "Nessel",
            },
        }

        const prefixes = {
            none:{
                name: "",
            },
            sharp:{
                name: "Scharfes",
            },
            massive:{
                name: "Massives",
            },
            light:{
                name: "Leichtes",
            },
            old:{
                name: "Altes",
            },
              
        };

        const suffixes = [
            "",
            "des Soldaten",
            "des Schmieds",
            "des Königs",
            "der Nacht"
        ];

        const inventory = [
            {
                material: "copper",
                form: "ore",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: "iron",
                form: "ore",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: "tin",
                form: "ore",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: "oak",
                form: "log",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: "hecht",
                form: "fish",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: "nessel",
                form: "herb",
                prefix: "none",
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
            {
                material: random(materials),
                form: random(forms),
                prefix: random(prefixes),
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
        
            },
        ];

        // ------------------------------------------------------------
        // Helper
        // ------------------------------------------------------------

        function random(array){
            
            const values = Object.entries(array);
            const [key,random] = values[Math.floor(Math.random() * values.length)];
            return key;

        }

        function pushRandomItem(){

            const item = {
                material: random(materials),
                form: random(forms),
                prefix: random(prefixes),
                suffix: " ",
                amount: 10,
                rarity: "common",
                quality: 10,
            }
            inventory.push(item);
            renderInventory();
        }

        // ------------------------------------------------------------
        // Funktionen
        // ------------------------------------------------------------

        function renderInventory() {

            const entry = document.getElementById("entryMidContainer");
            entry.innerHTML = '';
            
            for(const inventoryID in inventory){
                const inventorySlot = document.createElement("div");
                inventorySlot.className = "inventorySlot";
                const item = inventory[inventoryID];

                if(item.form === "fish"){
                    const itemName = materials[item.material].name;
                    
                    
                    const nameTag = document.createElement("p");
                    nameTag.className = "nameTag";
                    nameTag.innerHTML = `${prefixes[item.prefix].name} ${itemName}${item.suffix} (${item.rarity})` ;

                    const detailsTag = document.createElement("p");
                    detailsTag.className = "detailsTag";
                    detailsTag.innerHTML = `
                        <p>Anzahl: ${item.amount}</p>
                        <p>Qualität: ${item.quality}</p>
                    `;

                    inventorySlot.appendChild(nameTag);
                    inventorySlot.appendChild(detailsTag);

                    entry.appendChild(inventorySlot);

                continue;

                }

                //Itemname
                const itemName = materials[item.material].name + forms[item.form].name;
                
                const nameTag = document.createElement("p");
                nameTag.className = "nameTag";
                nameTag.innerHTML = `${prefixes[item.prefix].name} ${itemName}${item.suffix} (${item.rarity})` ;
                
                
                //Itemdetails
                const detailsTag = document.createElement("p");
                detailsTag.className = "detailsTag";
                detailsTag.innerHTML = `
                    <p>Anzahl: ${item.amount}</p>
                    <p>Qualität: ${item.quality}</p>
                `;
                inventorySlot.appendChild(nameTag);
                inventorySlot.appendChild(detailsTag);

                entry.appendChild(inventorySlot);
                
            }

        }
        
        renderInventory();
        
        
        document.getElementById("button1").addEventListener("click",renderInventory);
        document.getElementById("button2").addEventListener("click",pushRandomItem);
    </script>
</body>
</html>
