    <style>

        /*##################### GERÜST - START  #####################*/
        body{
            background-color: black;

        .headContainer{
            border: 1px solid rgb(217, 21, 150);
            margin-bottom: 5px;
            display: grid;
            grid-template-columns: 20% 60% 20%;

        }

            margin: 5px;
            margin-left: 0px;
            
        }

        .testelementContainer{

            margin: 5px;

        }

        .gameContainer{
            display: grid;

            height: 650px
            
        }

        .leftContainer{

            margin: 5px;
            margin-left: 0px;
        }

        .midContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
            
        }
        .entryMidContainer{
            height: 640px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        .rightContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
            margin-right: 0px;
        }

        .bottomContainer{
            border: 1px solid rgb(217, 21, 150);
            margin: 5px;
        }

        .footContainer{
            border: 1px solid rgb(217, 21, 150);
            margin-top: 5px;

        }

            margin: 5px;
            padding: 5px;
            /* color: rgb(182, 138, 167); */
            background-color: #15071a;
            border: 1px solid rgb(217, 21, 150);
            border-radius: 5px;
            border-left: 7px solid rgb(217, 21, 150);
        }
        .testEintrag p{
            margin: 5px;
            
        }

        /*##################### EINGEHÄNGTES CSS - START  #####################*/

        .button{
            background:#220a2b;
            color:#d8bfd8;

            width: 287px;
            height: 25px;
            border-radius:4px;
            cursor:pointer;
            text-align: left;
        }
        .button:hover{
            border-left: 7px solid rgb(245, 135, 207);

            background:#3b103f;
            
        }

        .inventorySlot{
            margin: 5px;
            height: max-content;
            border-right: 1px solid rgb(21, 61, 217);
            border-left: 5px solid rgb(21, 61, 217);
            border-radius: 5px;
        }

        .iconTag{
            width: 24px;
            height: 24px;
            border-bottom: 1px solid white;
            border-right: 1px solid white;
            border-radius: 5px;
        }
        .nameTag{
            margin: 0px;
            padding: 0px;
            /*border-left: 3px solid rgb(217, 21, 150);
            border-radius: 5px;*/
        }
        .titleDiv{
            margin: 5px;
            padding: 5px;
            border-left: 3px solid rgb(217, 21, 150);
            border-radius: 5px;
        }
        .detailsTag{
            margin: 10px;
            padding: 5px;
            color: bisque;
            border-left: 3px solid rgb(217, 21, 150);
            border-radius: 5px;
        }
        .detailsTag p{

        }

        function random(array){

            if(Array.isArray(array)){
                return array[Math.floor(Math.random() * array.length)];

            }

            const values = Object.entries(array);
            
            const [key,random] = values[Math.floor(Math.random() * values.length)];
            // console.log(key);
            return key;

        }

        function createRandomItem(){

            const item = {
                type: null,
                id: null,
                form: null,
                prefix: random(prefixes),
                suffix: random(suffixes),
                amount: 10,
                rarity: "common",
                quality: 10,
            }

            item.type = random(materials);
            item.id = random(materials[item.type].items);
            item.form = random(itemRules[item.type].forms);
            item.prefix = random(itemRules[item.type].prefixes);
            item.suffix = random(itemRules[item.type].suffixes);

            //für rarity eine gewichtungsfunktion einbauen
            item.rarity = random(itemRules[item.type].rarities);

        // ------------------------------------------------------------

        function renderInventory() {

            const entry = document.getElementById("entryMidContainer");
            entry.innerHTML = '';
            
            for(const inventoryID in inventory){
                const inventorySlot = document.createElement("div");
                inventorySlot.className = "inventorySlot";
                const item = inventory[inventoryID];
                let itemName = "";

                if(!forms[item.type][item.form].visible){
                    itemName = materials[item.type].items[item.id].name;
                
                }else{
                    itemName = materials[item.type].items[item.id].name + forms[item.type][item.form].name ;
                
                };

                const nameTag = document.createElement("span");
                nameTag.className = "nameTag";
                nameTag.style.color = types[item.type].color;
                nameTag.innerHTML = `${prefixes[item.prefix].name} ${itemName} ${suffixes[item.suffix]} ` ;
                
                const rarityTag = document.createElement("span");
                rarityTag.className = "rarityTag";
                rarityTag.style.color = rarities[item.rarity].color;
                rarityTag.innerHTML = `(${item.rarity})`;

                const iconTag = document.createElement("img");
                iconTag.className = "iconTag";
                iconTag.src = types[item.type].icon

                const detailsTag = document.createElement("p");
                detailsTag.className = "detailsTag";
                detailsTag.innerHTML = `
                    <p>Anzahl: ${item.amount}</p>
                    <p>Qualität: ${item.quality}</p>
                `;

                const titleDiv = document.createElement("div");
                titleDiv.className = "titleDiv";

                const titleSpan = document.createElement("span");
                titleDiv.className = "titleSpan";

                titleSpan.appendChild(iconTag);
                titleSpan.appendChild(nameTag);
                
                titleDiv.appendChild(document.createElement("br"));
                titleDiv.appendChild(rarityTag);
                
                inventorySlot.appendChild(titleDiv);
                
                inventorySlot.appendChild(detailsTag);

                entry.appendChild(inventorySlot);
                
            }

        }
