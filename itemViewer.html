        // ------------------------------------------------------------

        function random(array){

            if(Array.isArray(array)){
                return array[Math.floor(Math.random() * array.length)];

            }

            const values = Object.entries(array);
            
            const [key,random] = values[Math.floor(Math.random() * values.length)];
            
            return key;

        }

        function getItemId(item){
            return [
                item.type,
                item.material,
                item.form,
                item.prefix,
                item.suffix,
                item.rarity,
                item.quality
            ].join(":");
        }

        function addItemToInventory(item){

            let existing = null;
            
                for (const i of inventory) {
                    if (i.id === item.id) {
                        existing = i;
                        break;
                    }
                }
                
                if (existing) {
                    existing.amount += item.amount;
                    console.log("Anzahl ++");
                } else {
                    inventory.push(item);
                    console.log("items ++");
                }
            renderInventory();
            }

        function createRandomItem(){

            const item = {
                id: null,
                type: null,
                material: null,
                form: null,
                prefix: random(prefixes),
                suffix: random(suffixes),
                amount: 10,
                rarity: "common",
                quality: 10,
            }

            item.type = random(materials);
            item.material = random(materials[item.type].items);
            item.form = random(itemRules[item.type].forms);
            item.prefix = random(itemRules[item.type].prefixes);
            item.suffix = random(itemRules[item.type].suffixes);

            //für rarity eine gewichtungsfunktion einbauen
            item.rarity = random(itemRules[item.type].rarities);
            item.id = getItemId(item);
            console.log(item.id);
            addItemToInventory(item)

            renderInventory();
        }

                suffix,
                amount,
                rarity,
                quality
            };
        
            item.id = getItemId(item);
        
            addItemToInventory(item);
        }

        function testCreateItem(id) { //DEBUG FUNKTION

            if (!id) return;
        
            const parts = id.split(":");
        
            if (parts.length !== 7) {
                console.error("Ungültige Item-ID!");
                return;
            }
        
            const item = {
                type: parts[0],
                material: parts[1],
                form: parts[2],
                prefix: parts[3],
                suffix: parts[4],
                rarity: parts[5],
                quality: Number(parts[6]),
                amount: 1
            };

            if (!materials[item.type]?.items[item.material]) {
            console.error("Material existiert nicht.");
            return;
            }
            
            if (!forms[item.type]?.[item.form]) {
                console.error("Form existiert nicht.");
                return;
            }
            
            if (!prefixes[item.prefix] ||
                !suffixes[item.suffix] ||
                !rarities[item.rarity]) {
                console.error("Ungültige Eigenschaft.");
                return;
            }
        
            item.id = getItemId(item);
        
            addItemToInventory(item);
        }

        
        let testInterval = null;
        let countdownInterval = null;
        
        let intervalTime = 10;
        let secondsLeft = intervalTime;
        
        function toggleTestInterval() {
        
            if (testInterval) {
                clearInterval(testInterval);
                clearInterval(countdownInterval);
        
                testInterval = null;
                countdownInterval = null;
        
                document.getElementById("timer").textContent = "-";
                document.getElementById("progressBar").style.width = "0%";
                return;
            }
            const id = prompt(
                "Item-ID eingeben:\n" +
                "type:material:form:prefix:suffix:rarity:quality",
                "metal:copper:ore:none:none:common:10"
            );
            
            secondsLeft = intervalTime;

            updateProgress();
        
            testInterval = setInterval(() => {
        
                testCreateItem(id);
                secondsLeft = intervalTime;
                updateProgress();
        
            }, intervalTime * 1000);
        
        
            countdownInterval = setInterval(() => {
        
                secondsLeft--;
                updateProgress();
        
            }, 1000);
        }



        function updateProgress() {
        
            document.getElementById("timer").textContent = secondsLeft;
        
            const percent = (secondsLeft / intervalTime) * 100;
        
            document.getElementById("progressBar").style.width = percent + "%";
        }


        // ------------------------------------------------------------
        // Funktionen
        // ------------------------------------------------------------

        function renderInventory() {

            const entry = document.getElementById("entryMidContainer");
            entry.innerHTML = '';
            
            for(const inventoryID in inventory){
                const inventorySlot = document.createElement("div");
                inventorySlot.className = "inventorySlot";

                inventorySlot.addEventListener("click", () => {
                    // Alte Auswahl entfernen
                    document.querySelectorAll(".inventorySlot.selected")
                        .forEach(slot => slot.classList.remove("selected"));
                
                    // Diesen Slot auswählen
                    inventorySlot.classList.add("selected");
                
                    renderItemDetails(inventoryID);
                });
                
                const item = inventory[inventoryID];
                let itemName = "";

                if(!forms[item.type][item.form].visible){
                    itemName = materials[item.type].items[item.material].name;
                
                }else{
                    itemName = materials[item.type].items[item.material].name + forms[item.type][item.form].name ;
                
                };

                const nameTag = document.createElement("span");
                nameTag.className = "nameTag";
                nameTag.style.color = types[item.type].color;
                nameTag.innerHTML = `${prefixes[item.prefix].name} ${itemName} ${suffixes[item.suffix].name} ` ;
                
                const rarityTag = document.createElement("span");
                rarityTag.className = "rarityTag";
                rarityTag.style.color = rarities[item.rarity].color;
                rarityTag.innerHTML = `(${item.rarity}) x ${item.amount}`;

                const iconTag = document.createElement("img");
                iconTag.className = "iconTag";
                iconTag.src = types[item.type].icon

                //const detailsTag = document.createElement("p");
                //detailsTag.className = "detailsTag";
                //detailsTag.innerHTML = `
                //    <p>Anzahl: ${item.amount}</p>
                //    <p>Qualität: ${item.quality}</p>
                //`;

                const titleDiv = document.createElement("div");
                titleDiv.className = "titleDiv";

                const titleSpan = document.createElement("div");
                titleSpan.className = "titleSpan";

                titleSpan.appendChild(iconTag);
                titleSpan.appendChild(nameTag);
                titleDiv.appendChild(titleSpan);
                
                titleDiv.appendChild(rarityTag);
                
                inventorySlot.appendChild(titleDiv);
                
                //inventorySlot.appendChild(detailsTag);

                entry.appendChild(inventorySlot);
                
            }

        }

            entry.innerHTML = '';
            
                const inventoryDetailsSlot = document.createElement("div");

                if(!forms[item.type][item.form].visible){

                    <p>${item.suffix}</p>

                    <p>${item.rarity}</p>
                    <p>Anzahl: ${item.amount}</p>
                    <p>Qualität: ${item.quality}</p>
                    
                `;

                const titleDiv = document.createElement("div");

        }
        
        renderInventory();
        
        document.getElementById("button1").addEventListener("click",renderInventory);
        document.getElementById("button2").addEventListener("click",createRandomItem);
        document.getElementById("button3").addEventListener("click", testCreateItem);
        document.getElementById("button4").addEventListener("click", toggleTestInterval);
        

    </script>
